services:
  db:
    image: mysql:8.0
    container_name: menu_db
    restart: always
    env_file:
      - .env
    environment:
      MYSQL_DATABASE: menu_deliver
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      TZ: ${TZ}
    command:
      - --default-authentication-plugin=mysql_native_password
      - --default-time-zone=+09:00
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -p$${MYSQL_ROOT_PASSWORD} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  web:
    build: .
    container_name: menu_web
    restart: always
    env_file:
      - .env
    environment:
      MYSQL_HOST: db
    ports:
      - "80:10000"
    depends_on:
      db:
        condition: service_healthy

  scheduler:
    build: .
    container_name: menu_scheduler
    restart: always
    command: ["python", "-u", "scheduler.py"]
    env_file:
      - .env
    environment:
      MYSQL_HOST: db
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql_data:
